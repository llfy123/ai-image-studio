<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 生图工作台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="promo">
      <span>限时体验</span>
      <strong>小鸡聚合AI 接口已接入</strong>
      <a href="https://xiaoji.baziapi.site/docs" target="_blank" rel="noreferrer">查看文档</a>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="/" aria-label="AI 生图工作台 首页">
          <span class="brand-mark">AI</span>
          <span>
            <strong>Image Studio</strong>
            <small>AI 生图</small>
          </span>
        </a>

        <nav class="nav">
          <a class="active" href="#studio">首页</a>
          <a href="#gallery">灵感画廊</a>
          <a href="#settings">模型设置</a>
        </nav>

        <div class="nav-group">
          <p>AI 生成</p>
          <button class="nav-item active" data-mode-button="generate">图片生成</button>
          <button class="nav-item" data-mode-button="edit">图生图</button>
        </div>

        <div class="nav-group">
          <p>AI 模型</p>
          <button class="nav-item" data-model-shortcut="gpt-image-2">GPT Image 2 <span>NEW</span></button>
          <button class="nav-item" data-model-shortcut="dall-e-3">DALL·E 3</button>
          <button class="nav-item" data-model-shortcut="dall-e-2">DALL·E 2</button>
        </div>

        <div class="usage-card">
          <span>当前模式</span>
          <strong id="modeLabel">文生图</strong>
          <small>结果由小鸡聚合AI OpenAI 兼容接口返回</small>
        </div>
      </aside>

      <main class="main" id="studio">
        <header class="topbar">
          <button class="icon-btn" id="sidebarToggle" aria-label="打开导航">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="top-actions">
            <a class="ghost-link" href="https://img2.ai/zh" target="_blank" rel="noreferrer">UI 参考</a>
            <a class="login-btn" href="https://xiaoji.baziapi.site/console/keys" target="_blank" rel="noreferrer">API Key</a>
          </div>
        </header>

        <section class="hero">
          <div class="hero-copy">
            <h1>Image to AI：把想法变成图片</h1>
            <p>输入提示词、选择模型和画幅，几秒内生成适合电商、社媒和创意探索的视觉结果。</p>
          </div>

          <form class="composer" id="generateForm">
            <div class="mode-tabs" role="tablist" aria-label="生成模式">
              <button type="button" class="mode-tab active" data-mode-button="generate">AI 图片</button>
              <button type="button" class="mode-tab" data-mode-button="edit">图片改图</button>
            </div>

            <label class="prompt-box" for="prompt">
              <textarea id="prompt" name="prompt" maxlength="4000" placeholder="输入你的创意来生成...">一只穿着宇航服的橘猫，站在月球表面，背景是地球，写实风格</textarea>
            </label>

            <div class="edit-panel" id="editPanel" hidden>
              <label class="upload-box" for="imageInput">
                <input id="imageInput" name="image" type="file" accept="image/png,image/jpeg,image/webp,image/gif" />
                <span class="upload-icon">+</span>
                <strong>上传参考图</strong>
                <small>PNG / JPG / WEBP / GIF，最大 10MB</small>
              </label>
              <div class="preview" id="imagePreview" hidden>
                <img alt="参考图预览" />
                <button type="button" id="clearImage">移除</button>
              </div>
            </div>

            <div class="controls" id="settings">
              <label class="control">
                <span>模型</span>
                <select id="model" name="model">
                  <option value="gpt-image-2">GPT Image 2</option>
                  <option value="dall-e-3">DALL·E 3</option>
                  <option value="dall-e-2">DALL·E 2</option>
                </select>
              </label>

              <label class="control">
                <span>比例</span>
                <select id="size" name="size">
                  <option value="1024x1024">1:1</option>
                  <option value="1024x1792">9:16</option>
                  <option value="1792x1024">16:9</option>
                  <option value="512x512">512</option>
                  <option value="256x256">256</option>
                </select>
              </label>

              <label class="control">
                <span>质量</span>
                <select id="quality" name="quality">
                  <option value="standard">1K</option>
                  <option value="hd">HD</option>
                </select>
              </label>

              <label class="control">
                <span>张数</span>
                <input id="count" name="n" type="number" min="1" max="4" value="1" />
              </label>

              <button class="generate-btn" id="generateButton" type="submit">
                <span>生成</span>
                <small>3</small>
              </button>
            </div>
          </form>
        </section>

        <section class="model-strip" aria-label="模型分类">
          <span>Gemini Image</span>
          <span>GPT Image</span>
          <span>Seedream</span>
          <span>Flux</span>
          <span>Grok</span>
          <span>Veo</span>
        </section>

        <section class="quick-start">
          <div>
            <h2>今天你想创造什么？</h2>
            <p>用几次点击，把你的想法变成逼真的图片。</p>
          </div>
          <button class="secondary-btn" id="randomPrompt" type="button">换个灵感</button>
        </section>

        <section class="results-layout">
          <div class="result-panel">
            <div class="section-head">
              <div>
                <span>Result</span>
                <h2>生成结果</h2>
              </div>
              <button class="secondary-btn" id="clearResults" type="button">清空</button>
            </div>

            <div class="status" id="status" aria-live="polite">准备好生成第一张图片。</div>
            <div class="results-grid" id="resultsGrid"></div>
          </div>

          <aside class="inspiration" id="gallery">
            <div class="section-head">
              <div>
                <span>Gallery</span>
                <h2>灵感画廊</h2>
              </div>
            </div>
            <div class="masonry" id="promptGallery"></div>
          </aside>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
